name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate package manifests (pre-install)
        run: node scripts/ci-preflight.mjs

      - name: Check unresolved merge markers
        run: npm run check:no-conflicts

      - name: Install
        run: npm ci

      - name: Validate JSON
        run: npm run validate:json

      - name: Test
        run: npm test
