apiVersion: apps/v1
kind: Deployment
metadata:
  name: tender-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tender-api
  template:
    metadata:
      labels:
        app: tender-api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/tender-sahayak-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tender-api
spec:
  selector:
    app: tender-api
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tender-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tender-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
